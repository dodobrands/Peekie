# ─── Rule-specific options ──────────────────────────────────────────────────

line_length:
  warning: 110
  error: 140
  ignores_urls: true
  ignores_comments: false

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 60
    error: 80

function_body_length:
  warning: 100
  error: 150

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level: 5
  function_level: 5

type_body_length:
  warning: 500
  error: 700

file_length:
  warning: 800
  error: 1200
  ignore_comment_only_lines: true

closure_body_length:
  warning: 40
  error: 80

enum_case_associated_values_count:
  warning: 5
  error: 8

trailing_comma:
  mandatory_comma: true

number_separator:
  minimum_length: 5
