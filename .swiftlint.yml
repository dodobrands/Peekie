# SwiftLint config — Peekie
# https://realm.github.io/SwiftLint/rule-directory.html
#
# Posture: every shipped rule is enabled, including opt-in. Only rules that
# directly conflict with SwiftFormat are disabled — SwiftFormat owns layout
# and whitespace, SwiftLint owns semantics.

excluded:
  - .build
  - DerivedData
  - Tests/PeekieTests/Resources
  - Tests/PeekieTests/__Snapshots__
  - swift-tests-example

# missing_docs is scoped to the public SDK only — the helper module is
# test-only and its `testMake()` factories don't carry user docs.
missing_docs:
  excluded:
    - Sources/PeekieTestHelpers
    - Tests

disabled_rules:
  # Format conflicts — SwiftLint fires on code SwiftFormat already
  # laid out per our `.swiftformat` config.
  - opening_brace                            # ↔ swiftformat braces / wrapMultilineStatementBraces
  - function_name_whitespace                 # ↔ swiftformat operator-func no-space
  - file_header                              # ↔ swiftformat fileHeader
  - pattern_matching_keywords                # ↔ swiftformat hoistPatternLet (opposite directions)

  # Style preferences we deliberately don't enforce.
  - explicit_type_interface                  # against Swift type inference
  - explicit_acl                             # internal is the Swift default
  - explicit_top_level_acl                   # same
  - explicit_enum_raw_value                  # `case foo = "foo"` is redundant; Swift infers
  - prefixed_toplevel_constant               # Hungarian (`kFoo`) prefix is Objective-C era
  - required_deinit                          # not every class needs `deinit`
  - no_extension_access_modifier             # `private extension Foo {}` is a useful Swift pattern
  - no_grouping_extension                    # we group conformances into extensions on purpose
  - one_declaration_per_file                 # small related types belong together
  - variable_shadowing                       # `if let x = x` is canonical Swift
  - discouraged_default_parameter            # default parameters are core SDK ergonomics
  - no_magic_numbers                         # tests + xcresult schema have unavoidable numeric literals
  - no_empty_block                           # empty bodies appear in test stubs / no-op closures
  - file_name                                # private wrapper types intentionally live alongside their owners
  - static_operator                          # free operator overloads on Measurement are idiomatic
  - force_try                                # `try! NSRegularExpression(pattern:)` is compile-time-validated
  - closure_parameter_position               # multi-line closure args land on a new line via SwiftFormat
  - discouraged_optional_collection          # xcresult schema models "absent vs empty" with optional arrays
  - legacy_objc_type                         # we use NSRegularExpression / NSString API surface intentionally
  - optional_data_string_conversion          # `String(decoding:as:)` is the modern non-failable form for known-UTF-8 JSON output
analyzer_rules:
  - capture_variable
  - explicit_self
  - typesafe_array_init
  - unused_declaration
  - unused_import

